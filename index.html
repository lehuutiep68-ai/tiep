<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tool chuyển link Shopee</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h2>Tool chuyển link Shopee</h2>

<input id="link" placeholder="Dán link Shopee" style="width:300px;padding:10px">

<br><br>

<button onclick="taolink()" style="padding:10px 20px;background:#ee4d2d;color:white;border:none">
Tạo link
</button>

<p id="ketqua"></p>

<script>

function taolink(){

var link=document.getElementById("link").value;

var aff="17345380357";

var ketqua=link+"?af_id="+aff;

document.getElementById("ketqua").innerHTML=ketqua;

}

</script>

</body>
</html>
