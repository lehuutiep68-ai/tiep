<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shopee Link Converter</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.top{
background:#ee4d2d;
color:white;
padding:18px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.wrap{
max-width:720px;
margin:50px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:90%;
padding:14px;
font-size:16px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#ee4d2d;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#d73211;
}

.result{
margin-top:25px;
padding:15px;
background:#fff4f2;
border-radius:8px;
word-break:break-all;
}

.copy{
background:#333;
margin-top:10px;
}

.buy{
background:#28a745;
margin-left:10px;
}

.footer{
margin-top:50px;
text-align:center;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<div class="top">
Shopee Affiliate Link Tool
</div>

<div class="wrap">

<h2>Tạo link Shopee Affiliate</h2>

<p>Dán link sản phẩm Shopee vào bên dưới</p>

<input id="linkInput" placeholder="https://shopee.vn/...">

<br>

<button onclick="convert()">Tạo Link</button>

<div id="box" class="result" style="display:none">

<p id="output"></p>

<button class="copy" onclick="copy()">Copy Link</button>

<button class="buy" onclick="buyNow()">Mua ngay</button>

</div>

</div>

<div class="footer">
Tool chuyển link Shopee Affiliate
</div>

<script>

let finalLink="";

function convert(){

let link=document.getElementById("linkInput").value.trim();

if(link===""){
alert("Vui lòng nhập link Shopee");
return;
}

if(!link.includes("shopee")){
alert("Link không hợp lệ");
return;
}

let aff="af_id=17345380357";

if(link.includes("?")){
finalLink=link+"&"+aff;
}else{
finalLink=link+"?"+aff;
}

document.getElementById("box").style.display="block";

document.getElementById("output").innerHTML=
"<b>Link Affiliate:</b><br>"+finalLink;

}

function copy(){

navigator.clipboard.writeText(finalLink);

alert("Đã copy link!");

}

function buyNow(){

if(finalLink===""){
alert("Chưa có link!");
return;
}

window.open(finalLink,"_blank");

}

</script>

</body>
</html>
